schemaVersion: "1"
kind: agent
name: pi
displayName: Pi - Coding Agent
description: >
  Pi coding agent running in a Docker sandbox with isolated microVM.
  Supports multiple providers (Anthropic, OpenAI, Google, etc.) via
  the sandbox credential proxy.

agent:
  image: "docker/sandbox-templates:shell-docker"
  aiFilename: AGENTS.md
  persistence: persistent
  entrypoint:
    run: ["/home/agent/.pi/agent/pi-entrypoint"]

commands:
  install:
    - command: "curl -fsSL https://pi.dev/install.sh | sh"
      user: "1000"
      description: "Install Pi coding agent globally"
    - command: "curl -fsSL https://deb.nodesource.com/setup_23.x | bash - && sudo apt-get install -y nodejs"
      user: "0"
      description: "Install latest Node.js (v23) for undici v8 compatibility"

  startup:
    - command: ["sh", "-c", "pi update --self 2>/dev/null || true"]
      user: "1000"
      description: "Ensure pi is up to date on each sandbox start"
    - command:
        - sh
        - -c
        - |
          mkdir -p /home/agent/.pi/agent
          node <<'NODE'
          const fs = require("fs");
          const http = require("http");
          const https = require("https");
          
          const MODELS_JSON = "/home/agent/.pi/agent/models.json";
          const FALLBACK_OLLAMA_MODELS = ["llama3.1:8b", "qwen2.5-coder:7b"];
          const FALLBACK_OPENROUTER_MODELS = [
            "anthropic/claude-sonnet-4",
            "openai/gpt-4.1",
            "google/gemini-2.5-pro",
            "meta-llama/llama-3.3-70b-instruct"
          ];
          
          function getJson(url, timeoutMs = 2500) {
            const client = url.startsWith("https:") ? https : http;
          
            return new Promise((resolve, reject) => {
              const request = client.get(url, response => {
                let body = "";
                response.setEncoding("utf8");
                response.on("data", chunk => body += chunk);
                response.on("end", () => {
                  if (response.statusCode < 200 || response.statusCode >= 300) {
                    reject(new Error(url + " returned HTTP " + response.statusCode));
                    return;
                  }
          
                  try {
                    resolve(JSON.parse(body));
                  } catch (error) {
                    reject(error);
                  }
                });
              });
          
              request.setTimeout(timeoutMs, () => request.destroy(new Error(url + " timed out")));
              request.on("error", reject);
            });
          }
          
          async function discoverOllamaModels() {
            try {
              const tags = await getJson("http://host.docker.internal:11434/api/tags");
              const names = (tags.models || []).map(model => model.name).filter(Boolean).sort();
              return names.length ? names : FALLBACK_OLLAMA_MODELS;
            } catch (error) {
              console.warn("Ollama model discovery failed: " + error.message);
              return FALLBACK_OLLAMA_MODELS;
            }
          }
          
          async function discoverOpenRouterModels() {
            try {
              const catalog = await getJson("https://openrouter.ai/api/v1/models");
              const preferred = new Set(FALLBACK_OPENROUTER_MODELS);
              const discovered = (catalog.data || []).map(model => model.id).filter(Boolean);
              const useful = discovered.filter(id => preferred.has(id));
              return (useful.length ? useful : FALLBACK_OPENROUTER_MODELS).sort();
            } catch (error) {
              console.warn("OpenRouter model discovery failed: " + error.message);
              return FALLBACK_OPENROUTER_MODELS;
            }
          }
          
          function ollamaProvider(modelIds) {
            return {
              baseUrl: "http://host.docker.internal:11434/v1",
              api: "openai-completions",
              apiKey: "ollama",
              compat: {
                supportsDeveloperRole: false,
                supportsReasoningEffort: false
              },
              models: modelIds.map(id => ({ id }))
            };
          }
          
          function openRouterProvider(modelIds) {
            return {
              baseUrl: "https://openrouter.ai/api/v1",
              api: "openai-completions",
              apiKey: "OPENROUTER_API_KEY",
              authHeader: true,
              headers: {
                "HTTP-Referer": "https://pi.dev",
                "X-Title": "Pi Coding Agent"
              },
              models: modelIds.map(id => ({ id }))
            };
          }
          
          async function main() {
            const [ollamaModels, openRouterModels] = await Promise.all([
              discoverOllamaModels(),
              discoverOpenRouterModels()
            ]);
          
            const config = {
              providers: {
                ollama: ollamaProvider(ollamaModels),
                openrouter: openRouterProvider(openRouterModels)
              }
            };
          
            fs.writeFileSync(MODELS_JSON, JSON.stringify(config, null, 2) + "\n");
            console.log("Wrote " + MODELS_JSON + " with " + ollamaModels.length + " Ollama model(s) and " + openRouterModels.length + " OpenRouter model(s).");
          }
          
          main().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
      user: "1000"
      description: "Generate pi models.json from independent Ollama and OpenRouter providers"

  initFiles:
    - path: /home/agent/.pi/agent/pi-entrypoint
      content: |
        #!/bin/sh
        set -eu

        if [ $# -gt 0 ] && [ "$1" = "--" ]; then
          shift
        fi

        args=" $* "
        provider="ollama"
        model="qwen3:8b"
        thinking=""

        if [ -n "$thinking" ] && ! echo "$args" | grep -q ' --thinking '; then
          set -- --thinking "$thinking" "$@"
        fi

        if [ -n "$model" ] && ! echo "$args" | grep -q ' --model '; then
          set -- --model "$model" "$@"
        fi

        if [ -n "$provider" ] && ! echo "$args" | grep -q ' --provider '; then
          set -- --provider "$provider" "$@"
        fi

        exec pi "$@"
      mode: "0755"
      onlyIfMissing: false
      description: "Launch pi with kit defaults while allowing sbx agent args to override them"

    - path: /home/agent/.pi/agent/settings.json
      content: |
        {
          "enableInstallTelemetry": false,
          "PI_SKIP_VERSION_CHECK": false,
          "defaultProvider": "ollama",
          "defaultModel": "qwen3:8b",
          "defaultThinkingLevel": "off"
        }
      mode: "0644"
      onlyIfMissing: true
      description: "Default pi settings with telemetry disabled"


