    - "yarnpkg.com:443"
    # END GENERATED DOMAIN PROFILES

  serviceDomains:
    api.anthropic.com: anthropic
    api.openai.com: openai
    generativelanguage.googleapis.com: google
    openrouter.ai: openrouter

  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"
    google:
      headerName: x-goog-api-key
      valueFormat: "%s"
    openrouter:
      headerName: Authorization
      valueFormat: "Bearer %s"

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY
    openai:
      env:
        - OPENAI_API_KEY
    google:
      env:
        - GOOGLE_API_KEY
    openrouter:
      env:
        - OPENROUTER_API_KEY

environment:
  variables:
    IS_SANDBOX: "1"
    PI_OFFLINE: "0"
  proxyManaged:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - GOOGLE_API_KEY
    - OPENROUTER_API_KEY

memory: |
  ## Sandbox Environment

  You are running Pi inside a Docker sandbox with microVM isolation.

   ### Key Facts
   - The workspace is mounted at its absolute host path
   - `sudo` is passwordless — use it for apt/pip/npm package installs
   - Docker Engine is available inside the sandbox for running containers
   - Containers you start are isolated in the microVM
   - Your home directory is `/home/agent/`
   - Pi config is at `~/.pi/agent/`

   ### Working with Tools
   - Use `!command` to run shell commands and include output in context
   - Use `!!command` to run commands without including output in context
   - Type `@` to fuzzy-search and reference project files
   - Use `/model` to switch models during a session
   - Use `/tree` to navigate session history and branches
   - Set `PI_DEFAULT_PROVIDER`, `PI_DEFAULT_MODEL`, and optionally `PI_DEFAULT_THINKING` before starting the sandbox to override the startup model

   ### Credentials
   - API keys are managed by the host sandbox proxy
   - Environment variables like ANTHROPIC_API_KEY are set to "proxy-managed"
   - The proxy injects real credentials on outbound requests automatically

   ### Networking
   - Outbound traffic is restricted to allowed domains in the kit spec
   - Host services are reachable via `host.docker.internal`
   - Published ports must bind to 0.0.0.0, not 127.0.0.1

   ### Git
   - Git is pre-configured and available
   - Use branch mode (`--branch`) for isolated work on feature branches
   - SSH commit signing is supported via forwarded host keys
